<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mon Budget — Suivi en temps réel</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
:root{
  --bg:#f4f6fb; --panel:#ffffff; --panel-2:#f8fafc; --border:#e6e9f0; --text:#1a2130;
  --muted:#6b7488; --accent:#4361ee; --accent-2:#3a0ca3; --good:#12b76a; --bad:#f04438;
  --warn:#f79009; --save:#7c3aed; --invest:#0891b2; --income:#12b76a;
  --shadow:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);
  --shadow-lg:0 10px 30px rgba(16,24,40,.10);
  --r:14px;
  --c0:#4361ee;--c1:#f79009;--c2:#12b76a;--c3:#f04438;--c4:#7c3aed;--c5:#0891b2;--c6:#ec4899;--c7:#64748b;--c8:#84cc16;--c9:#eab308;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#0e1117; --panel:#171b24; --panel-2:#1e232e; --border:#2a303c; --text:#e7ebf3;
    --muted:#9aa4b8; --accent:#6d87ff; --shadow:0 1px 3px rgba(0,0,0,.4);
    --shadow-lg:0 12px 34px rgba(0,0,0,.5);
  }
}
:root[data-theme="dark"]{
  --bg:#0e1117; --panel:#171b24; --panel-2:#1e232e; --border:#2a303c; --text:#e7ebf3;
  --muted:#9aa4b8; --accent:#6d87ff; --shadow:0 1px 3px rgba(0,0,0,.4); --shadow-lg:0 12px 34px rgba(0,0,0,.5);
}
:root[data-theme="light"]{
  --bg:#f4f6fb; --panel:#ffffff; --panel-2:#f8fafc; --border:#e6e9f0; --text:#1a2130;
  --muted:#6b7488; --shadow:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04); --shadow-lg:0 10px 30px rgba(16,24,40,.10);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3{margin:0}
a{color:var(--accent)}
button{font-family:inherit;cursor:pointer}
.wrap{max-width:1180px;margin:0 auto;padding:0 18px 80px}

/* Header */
header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:1px solid var(--border);backdrop-filter:saturate(1.2) blur(6px)}
.hbar{max-width:1180px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;letter-spacing:-.02em}
.brand .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:#fff;font-size:16px}
.spacer{flex:1}
.selects{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
select,input[type=number],input[type=text],input[type=password]{background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:8px 10px;font-size:14px;outline:none}
select:focus,input:focus{border-color:var(--accent)}
label.fld{display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--muted);font-weight:600}
label.fld input{width:100%;text-align:left;font-weight:500;color:var(--text)}
code{background:var(--panel-2);border:1px solid var(--border);border-radius:6px;padding:1px 6px;font-size:12.5px}
.iconbtn{background:var(--panel);border:1px solid var(--border);border-radius:10px;width:38px;height:38px;display:grid;place-items:center;color:var(--text);font-size:16px}
.iconbtn:hover{border-color:var(--accent)}

/* Tabs */
.tabs{display:flex;gap:5px;overflow-x:auto;padding:8px 0;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{display:inline-flex;align-items:center;gap:7px;background:transparent;border:none;color:var(--muted);padding:9px 14px;border-radius:11px;font-size:14px;font-weight:650;white-space:nowrap;cursor:pointer;transition:background .18s ease,color .18s ease,transform .1s ease}
.tab .tico{font-size:15px;line-height:1}
.tab:hover{color:var(--text);background:var(--panel-2)}
.tab:active{transform:scale(.96)}
.tab.active{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 4px 12px color-mix(in srgb,var(--accent) 35%,transparent)}
@media(max-width:600px){.tab .tlbl{display:none}.tab.active .tlbl{display:inline}.tab{padding:9px 12px}}

/* Cards */
.grid{display:grid;gap:14px}
.kpis{grid-template-columns:repeat(4,1fr);margin-top:18px}
@media(max-width:980px){.kpis{grid-template-columns:repeat(2,1fr)}}
.kpi{display:flex;flex-direction:column;min-height:108px}
.kpi .sub{margin-top:auto;padding-top:4px;min-height:22px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
.kpi .label{font-size:12.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.03em;display:flex;align-items:center;gap:7px}
.kpi .val{font-size:26px;font-weight:750;letter-spacing:-.02em;margin-top:8px}
.kpi .sub{font-size:12.5px;color:var(--muted);margin-top:4px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:3px 8px;border-radius:20px}
.pill.up{color:var(--good);background:color-mix(in srgb,var(--good) 14%,transparent)}
.pill.down{color:var(--bad);background:color-mix(in srgb,var(--bad) 14%,transparent)}
.pill.neutral{color:var(--muted);background:var(--panel-2)}

.section{margin-top:18px}
.section h2{font-size:16px;font-weight:700;margin-bottom:12px;letter-spacing:-.01em}
.two{display:grid;grid-template-columns:1.1fr .9fr;gap:14px}
@media(max-width:820px){.two{grid-template-columns:1fr}.hbar{gap:8px}}

/* Progress / bars */
.barrow{display:flex;align-items:center;gap:12px;margin:9px 0}
.barrow .nm{width:150px;font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:8px;flex-shrink:0}
.track{flex:1;height:9px;background:var(--panel-2);border-radius:20px;overflow:hidden;position:relative}
.fill{height:100%;border-radius:20px}
.barrow .amt{width:92px;text-align:right;font-variant-numeric:tabular-nums;font-size:13.5px;font-weight:600}
.legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin-top:12px}
.legend .li{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted)}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{text-align:left;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.03em;font-weight:700;padding:8px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel)}
.tbl td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:hover td{background:var(--panel-2)}
.tbl .num{text-align:right;font-variant-numeric:tabular-nums}
.grouphead td{background:var(--panel-2);font-weight:800;font-size:12.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
.editval{width:96px;text-align:right;font-variant-numeric:tabular-nums;padding:6px 8px}
.tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;color:#fff;white-space:nowrap}
.rowbtn{background:transparent;border:none;color:var(--muted);font-size:15px;padding:4px 6px;border-radius:6px}
.rowbtn:hover{color:var(--bad);background:color-mix(in srgb,var(--bad) 12%,transparent)}
.btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:9px 15px;font-size:14px;font-weight:650}
.btn:hover{filter:brightness(1.06)}
.btn.ghost{background:var(--panel);color:var(--text);border:1px solid var(--border)}
.btn.ghost:hover{border-color:var(--accent)}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.muted{color:var(--muted)}
.right{text-align:right}
.center{text-align:center}
.money{font-variant-numeric:tabular-nums;font-weight:650}
.pos{color:var(--good)} .neg{color:var(--bad)}
svg{display:block;max-width:100%}
.chartwrap{overflow-x:auto}
.tt{position:fixed;pointer-events:none;background:var(--text);color:var(--bg);padding:6px 9px;border-radius:8px;font-size:12px;font-weight:600;opacity:0;transition:opacity .1s;z-index:100;white-space:nowrap;box-shadow:var(--shadow-lg)}
.empty{color:var(--muted);text-align:center;padding:30px;font-size:14px}
.addform{display:grid;grid-template-columns:1fr 1fr 1.4fr 120px auto;gap:8px;align-items:center}
@media(max-width:820px){.addform{grid-template-columns:1fr 1fr}}
.hint{font-size:12.5px;color:var(--muted)}
.switch{display:flex;gap:0;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.switch button{background:var(--panel);border:none;padding:7px 12px;font-size:13px;color:var(--muted);font-weight:650}
.switch button.on{background:var(--accent);color:#fff}
.chip{display:inline-flex;gap:6px;align-items:center;background:var(--panel-2);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-size:12.5px;font-weight:600}
#acctBtn:hover{border-color:var(--accent)}
#errBar{max-width:1180px;margin:12px auto 0;padding:12px 16px;background:color-mix(in srgb,var(--bad) 12%,var(--panel));border:1px solid var(--bad);border-radius:12px;color:var(--text);font-size:13.5px;display:flex;gap:12px;align-items:flex-start}
#errBar .x{margin-left:auto;cursor:pointer;color:var(--muted);font-weight:700;flex-shrink:0}
#errBar code{word-break:break-all}
.quickadd .qa-row{display:grid;grid-template-columns:180px 140px 1fr auto;gap:10px;align-items:center}
@media(max-width:720px){.quickadd .qa-row{grid-template-columns:1fr 1fr}.quickadd .qa-row .btn{grid-column:1/-1}}
.catgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;margin-top:14px}
.catcard{border:1px solid var(--border);border-radius:12px;padding:12px 14px;background:var(--panel-2);transition:box-shadow .15s}
.catcard.flash{box-shadow:0 0 0 2px var(--accent)}
.catcard-top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.catname{font-weight:700;font-size:13.5px;display:flex;align-items:center;gap:7px}
.catreste{font-weight:750;font-size:13.5px;white-space:nowrap}
.catcard-bot{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted);gap:8px;margin-top:6px}
.budinput{width:66px;padding:3px 6px;font-size:12px;text-align:right}
.rowbetween{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.bignum{font-size:23px;font-weight:800;letter-spacing:-.02em}
.miniremain{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border)}
.miniremain:last-child{border-bottom:none}
body.landing .tabs,body.landing #yearSel,body.landing #monthSel{display:none}
.hero{max-width:700px;margin:5vh auto 0;text-align:center;padding:0 18px 40px}
.hero .logo-lg{width:66px;height:66px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;color:#fff;font-size:32px;margin:0 auto 18px;box-shadow:var(--shadow-lg)}
.hero h1{font-size:30px;letter-spacing:-.03em;margin-bottom:10px}
.hero p.lead{color:var(--muted);font-size:16px;max-width:540px;margin:0 auto 24px;line-height:1.55}
.hero .feats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:28px 0}
@media(max-width:640px){.hero .feats{grid-template-columns:1fr}}
.hero .feat{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px 14px;text-align:left}
.hero .feat .fi{font-size:20px}
.hero .feat b{display:block;margin:6px 0 3px;font-size:14px}
.hero .feat span{font-size:12.5px;color:var(--muted)}
.gbtn{display:inline-flex;align-items:center;gap:11px;background:#fff;color:#3c4043;border:1px solid #dadce0;border-radius:11px;padding:12px 20px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:var(--shadow);transition:box-shadow .15s}
.gbtn:hover{box-shadow:var(--shadow-lg)}
.prevrow{display:grid;grid-template-columns:1.25fr 160px 1fr 100px 92px;gap:10px;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border)}
.prevrow:last-child{border-bottom:none}
.prevhead{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);font-weight:700;background:var(--panel-2)}
.prevname{font-weight:650;font-size:13.5px;display:flex;align-items:center;gap:8px}
.prevbudget{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--muted)}
.prev-inp{width:92px;text-align:right}
.prevreal{font-size:13px;text-align:right}
.prevrest{font-weight:700;text-align:right;font-variant-numeric:tabular-nums}
.prevtot{font-weight:800;background:var(--panel-2)}
@media(max-width:720px){.prevrow{grid-template-columns:1fr auto;gap:4px 10px}.prevbar{display:none}.prevhead{display:none}
  .prevname{grid-column:1}.prevbudget{grid-column:2;justify-self:end}.prevreal{grid-column:1;text-align:left}.prevrest{grid-column:2;justify-self:end}}
.acctmenu{position:absolute;right:0;top:calc(100% + 6px);min-width:230px;background:var(--panel);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);padding:6px;z-index:80}
.acctmenu .acctinfo{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--muted);padding:8px 10px 2px}
.acctmenu .acctemail{font-size:13px;font-weight:600;padding:0 10px 8px;border-bottom:1px solid var(--border);margin-bottom:6px;word-break:break-all}
.acctitem{display:flex;width:100%;align-items:center;gap:9px;background:transparent;border:none;color:var(--text);font-size:13.5px;font-weight:600;padding:9px 10px;border-radius:8px;text-align:left}
.acctitem:hover{background:var(--panel-2)}
.acctitem.danger{color:var(--bad)}
.setrow{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)}
.setrow:last-child{border-bottom:none}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:11px 18px;border-radius:12px;font-weight:650;font-size:14px;box-shadow:var(--shadow-lg);opacity:0;transition:.25s;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <div class="hbar">
    <div class="brand"><div class="logo">€</div>Mon Budget</div>
    <div class="spacer"></div>
    <div class="selects">
      <div id="acctWrap" style="position:relative;display:none">
        <button id="acctBtn" class="chip" style="cursor:pointer;gap:7px" aria-haspopup="true"></button>
        <div id="acctMenu" class="acctmenu" style="display:none"></div>
      </div>
      <select id="yearSel"></select>
      <select id="monthSel"></select>
      <button class="iconbtn" id="themeBtn" title="Thème">◐</button>
    </div>
  </div>
  <div class="hbar" style="padding-top:0;padding-bottom:0">
    <div class="tabs" id="tabs"></div>
  </div>
</header>

<div id="errBar" style="display:none"></div>

<div class="wrap">
  <div id="view"></div>
</div>

<div class="tt" id="tt"></div>
<div class="toast" id="toast"></div>

<script>
/* ============ DONNÉES ============
   Aucune donnée personnelle n'est stockée dans ce fichier (dépôt public).
   Les données réelles sont chargées depuis ton dépôt GitHub privé (onglet Réglages). */
const SEED_TXNS = [];

/* ============ CONFIG ============ */
const CONSO = ['CHARGE COURANTE','BOUFFE','PERSONNEL','IMPÔT','DETTE','AIDE','AUTRE'];
const SAVE_CATS = ['EPARGNE','INVESTISSEMENT'];
const INCOME = 'ENTREE';
const CAT_ORDER = [...CONSO, ...SAVE_CATS, INCOME];
const CAT_COLOR = {
  'CHARGE COURANTE':'var(--c0)','BOUFFE':'var(--c1)','PERSONNEL':'var(--c6)','IMPÔT':'var(--c3)',
  'DETTE':'var(--c7)','AIDE':'var(--c9)','AUTRE':'var(--c8)','EPARGNE':'var(--c4)','INVESTISSEMENT':'var(--c5)','ENTREE':'var(--c2)'
};
const CAT_LABEL = {
  'CHARGE COURANTE':'Charges courantes','BOUFFE':'Alimentation','PERSONNEL':'Personnel','IMPÔT':'Impôts',
  'DETTE':'Dettes','AIDE':'Aide / Dons','AUTRE':'Autre','EPARGNE':'Épargne','INVESTISSEMENT':'Investissement','ENTREE':'Revenus'
};
const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const LIVRET_LABEL = 'LIVRET A'; // ligne calculée = reste à épargner

/* ============ ÉTAT ============ */
const LS_KEY = 'monbudget_v1';
let STATE = load();
let CUR = pickDefaultMonth();
let TAB = 'dash';
let evoYear = 2026;
let FOCUS_QA = null;   // catégorie à re-sélectionner après un ajout rapide

function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const s = JSON.parse(raw); if(s && s.txns) return migrate(s); }
  }catch(e){}
  return migrate({txns:deepcopy(SEED_TXNS), settings:{}});
}
function migrate(s){
  s.settings = s.settings || {};
  if(s.settings.startSavings==null) s.settings.startSavings = 0; // épargne de départ (à régler dans Réglages)
  if(!s.settings.budgets) s.settings.budgets = {};
  if(!s.settings.forecast || typeof s.settings.forecast!=='object') s.settings.forecast = {}; // prévisions par mois : {"2026-07":{"BOUFFE":400,...}}
  if(!Array.isArray(s.settings.assets)) s.settings.assets = [];   // actifs (patrimoine)
  if(!Array.isArray(s.settings.liabs))  s.settings.liabs  = [];   // passifs (dettes patrimoine)
  s.settings.assets.forEach(a=>{ if(!a.id) a.id=uid(); });
  s.settings.liabs.forEach(a=>{ if(!a.id) a.id=uid(); });
  // enlève la ligne LIVRET A des txns éditables : c'est un calcul (reste = revenus - dépenses)
  s.txns = (s.txns||[]).filter(t=>!(t.label||'').toUpperCase().includes(LIVRET_LABEL));
  s.txns.forEach(t=>{ if(!t.id) t.id = uid(); });
  return s;
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(STATE)); scheduleSync(); }
function saveLocalOnly(){ localStorage.setItem(LS_KEY, JSON.stringify(STATE)); }
function deepcopy(o){ return JSON.parse(JSON.stringify(o)); }
function uid(){ return 't'+Math.random().toString(36).slice(2,9); }

/* ============ CONNEXION GOOGLE (OAuth) + API GOOGLE SHEETS ============ */
/* Identifiant OAuth « Web » (public, non secret). Renseigné par le propriétaire de l'app,
   ou saisissable dans Réglages. Créé une fois sur console.cloud.google.com. */
const GOOGLE_CLIENT_ID = '85707299746-45mcotl9l1k1g1vuauo02ec000i2kq4l.apps.googleusercontent.com';
const GOOGLE_API_KEY = 'AIzaSyD1Exztu83LWs8qcPdJhxrTg9Kc7W1lWuY'; // clé API navigateur (Picker)
const OAUTH_SCOPE = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/userinfo.email';
const SHEET_TITLE = 'Mon Budget — données';
const DATA_TAB = 'budget';           // onglet technique contenant les données (JSON fractionné)
const CHUNK = 45000;                 // taille max d'une cellule (< 50000)

/* Quelques lignes d'exemple pour le tout premier lancement (modifiables/supprimables) */
const STARTER=[
  {categorie:'CHARGE COURANTE',groupe:'APPARTEMENT',label:'Loyer / crédit',values:{}},
  {categorie:'CHARGE COURANTE',groupe:'ABONNEMENT',label:'Internet / téléphone',values:{}},
  {categorie:'CHARGE COURANTE',groupe:'APPARTEMENT',label:'Électricité',values:{}},
  {categorie:'BOUFFE',groupe:'COURSE',label:'Courses',values:{}},
  {categorie:'BOUFFE',groupe:'COURSE',label:'Restaurant / commande',values:{}},
  {categorie:'PERSONNEL',groupe:'TRANSPORT',label:'Transport',values:{}},
  {categorie:'PERSONNEL',groupe:'COURSE',label:'Loisirs / plaisir',values:{}},
  {categorie:'EPARGNE',groupe:'EPARGNE',label:'Épargne',values:{}},
  {categorie:'ENTREE',groupe:'ENTREE',label:'Salaire',values:{}}
];

let syncTimer=null, syncState='off'; // off|ok|syncing|error|offline|signedout
let tokenClient=null, accessToken=null, tokenExp=0, gisReady=false;
let googleUser = localStorage.getItem('mb_email')||'';
let sheetId = localStorage.getItem('mb_sheetid')||'';

function clientId(){ return GOOGLE_CLIENT_ID || localStorage.getItem('mb_clientid') || ''; }
function apiKey(){ return GOOGLE_API_KEY || localStorage.getItem('mb_apikey') || ''; }
function isSignedIn(){ return !!(accessToken && Date.now()<tokenExp); }
function syncConfigured(){ return isSignedIn() && !!sheetId; }

function setSync(s,msg){ syncState=s; updateSyncChip(msg); }
function updateSyncChip(msg){
  const wrap=document.getElementById('acctWrap'); if(!wrap) return;
  if(!accessToken && syncState!=='signedout'){ wrap.style.display='none'; return; }
  wrap.style.display='';

/* --- GIS (Google Identity Services) --- */
function gisAvailable(){ return !!(window.google && google.accounts && google.accounts.oauth2); }
function waitForGis(timeoutMs=8000){
  return new Promise((resolve,reject)=>{
    if(gisAvailable()){ gisReady=true; return resolve(); }
    const t0=Date.now();
    const iv=setInterval(()=>{
      if(gisAvailable()){ clearInterval(iv); gisReady=true; resolve(); }
      else if(Date.now()-t0>timeoutMs){ clearInterval(iv); reject(new Error('gis-timeout')); }
    },150);
  });
}
function setupTokenClient(){
  if(!gisAvailable() || !clientId()) return false;
  if(tokenClient) return true;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId(),
    scope: OAUTH_SCOPE,
    callback: (resp)=>{ if(pendingAuth){ const p=pendingAuth; pendingAuth=null; p(resp); } }
  });
  return true;
}
let pendingAuth=null;
async function requestToken(interactive){
  if(!clientId()) throw new Error('noclient');
  await waitForGis();
  setupTokenClient();
  if(!tokenClient) throw new Error('noclient');
  return new Promise((resolve,reject)=>{
    pendingAuth=(resp)=>{
      if(resp && resp.access_token){ accessToken=resp.access_token; tokenExp=Date.now()+(resp.expires_in?resp.expires_in*1000:3500*1000)-60000; resolve(resp); }
      else reject(new Error(resp && resp.error || 'noauth'));
    };
    try{ tokenClient.requestAccessToken({prompt: interactive?'consent':''}); }
    catch(e){ pendingAuth=null; reject(e); }
  });
}
async function ensureToken(){
  if(isSignedIn()) return true;
  await requestToken(false); // renouvellement silencieux
  return isSignedIn();
}

/* --- Appels API Google (avec renouvellement de jeton) --- */
async function gapiFetch(url, opts={}, retry=true){
  await ensureToken();
  opts.headers=Object.assign({}, opts.headers, {'Authorization':'Bearer '+accessToken});
  const r=await fetch(url, opts);
  if(r.status===401 && retry){ accessToken=null; await requestToken(false); return gapiFetch(url,opts,false); }
  if(!r.ok){ const t=await r.text(); throw new Error('API '+r.status+' '+t.slice(0,120)); }
  return r;
}
async function fetchUserEmail(){
  try{ const r=await gapiFetch('https://www.googleapis.com/oauth2/v3/userinfo'); const j=await r.json();
    googleUser=j.email||''; if(googleUser) localStorage.setItem('mb_email',googleUser); }catch(e){}
}

/* --- Trouver / créer le classeur de l'utilisateur --- */
async function ensureSpreadsheet(){
  if(sheetId){
    try{ await gapiFetch('https://sheets.googleapis.com/v4/spreadsheets/'+sheetId+'?fields=spreadsheetId'); return sheetId; }
    catch(e){ sheetId=''; localStorage.removeItem('mb_sheetid'); }
  }
  // chercher un fichier déjà créé par l'app (scope drive.file → ne voit que ses fichiers)
  const q=encodeURIComponent(`name='${SHEET_TITLE}' and mimeType='application/vnd.google-apps.spreadsheet' and trashed=false`);
  const s=await gapiFetch('https://www.googleapis.com/drive/v3/files?q='+q+'&spaces=drive&fields=files(id,name)');
  const sj=await s.json();
  if(sj.files && sj.files.length){ sheetId=sj.files[0].id; localStorage.setItem('mb_sheetid',sheetId); return sheetId; }
  // créer
  const c=await gapiFetch('https://sheets.googleapis.com/v4/spreadsheets',{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({properties:{title:SHEET_TITLE},sheets:[{properties:{title:DATA_TAB}}]})});
  const cj=await c.json(); sheetId=cj.spreadsheetId; localStorage.setItem('mb_sheetid',sheetId);
  return sheetId;
}

/* --- Lire / écrire l'état (JSON fractionné en cellules, valueInputOption RAW) --- */
async function readRemote(){
  const r=await gapiFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${DATA_TAB}!A1:A200?majorDimension=COLUMNS`);
  const j=await r.json();
  const col=(j.values && j.values[0])||[];
  const raw=col.join('');
  if(!raw) return null;
  try{ return JSON.parse(raw); }catch(e){ return null; }
}
async function writeRemote(){
  const raw=JSON.stringify(STATE);
  const chunks=[]; for(let i=0;i<raw.length;i+=CHUNK) chunks.push([raw.slice(i,i+CHUNK)]);
  if(!chunks.length) chunks.push(['']);
  // efface l'ancien contenu puis écrit
  await gapiFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${DATA_TAB}!A1:A200:clear`,{method:'POST'});
  await gapiFetch(`https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/${DATA_TAB}!A1?valueInputOption=RAW`,
    {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({range:`${DATA_TAB}!A1`,majorDimension:'COLUMNS',values:[chunks.map(c=>c[0])]})});
}

async function syncPull(){
  if(!syncConfigured()) return {ok:false};
  setSync('syncing');
  try{
    const data=await readRemote();
    if(data && data.txns){ STATE=migrate(data); saveLocalOnly(); }
    else { await writeRemote(); } // classeur neuf : on y pousse l'état courant
    setSync('ok'); return {ok:true};
  }catch(e){ setSync('error','Erreur'); return {ok:false,error:e.message}; }
}
async function syncPushNow(){
  if(!syncConfigured()) return;
  if(!navigator.onLine){ setSync('offline'); return; }
  setSync('syncing');
  try{ await writeRemote(); setSync('ok'); }
  catch(e){ setSync('error','Échec sync'); }
}
function scheduleSync(){ if(!syncConfigured()) return; clearTimeout(syncTimer); setSync('syncing'); syncTimer=setTimeout(syncPushNow,1400); }

/* --- Connexion / déconnexion --- */
// Ouvre la fenêtre Google DE FAÇON SYNCHRONE dans le clic (sinon Safari bloque le popup).
// Tout le travail asynchrone (Drive/Sheets) se fait ensuite dans le callback.
function startSignIn(promptMode){
  if(!clientId()){ toast('Identifiant Google non configuré (voir Réglages)'); return; }
  if(!gisAvailable()){ toast('Google se charge… réessaie dans 2 s'); waitForGis().catch(()=>{}); return; }
  if(!setupTokenClient()){ toast('Config Google manquante'); return; }
  setSync('syncing'); toast('Connexion à Google…');
  pendingAuth = async (resp)=>{
    try{
      if(!resp || !resp.access_token) throw new Error('Autorisation refusée ('+(resp && resp.error||'inconnue')+')');
      accessToken=resp.access_token;
      tokenExp=Date.now()+(resp.expires_in?resp.expires_in*1000:3500*1000)-60000;
      updateSyncChip();
      await fetchUserEmail();
      await ensureSpreadsheet();
      if(STATE.txns.length===0){ STATE=migrate({txns:deepcopy(STARTER),settings:{}}); }
      await syncPull();
      hideErr(); updateSyncChip(); render(); toast('Connecté'+(googleUser?' : '+googleUser:'')+' ✓');
    }catch(e){ setSync('error','Connexion échouée'); render();
      showErr('La connexion a échoué juste après l\'autorisation', e && e.message); }
  };
  try{ tokenClient.requestAccessToken({prompt: promptMode||'consent'}); }
  catch(e){ pendingAuth=null; setSync('error'); showErr('Impossible d\'ouvrir la fenêtre Google', e && e.message); }
}
function signInGoogle(){ startSignIn('consent'); }
function switchAccount(){
  // révoque le jeton courant et rouvre le sélecteur de compte

  accessToken=null; tokenExp=0; googleUser=''; localStorage.removeItem('mb_email');
  sheetId=''; localStorage.removeItem('mb_sheetid'); localStorage.removeItem('mb_shared');

function signOutGoogle(){

/* ============ HELPERS ============ */
const fmt = (n)=> (n||0).toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0});
const fmt2 = (n)=> (n||0).toLocaleString('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2});
const pct = (n)=> (isFinite(n)?Math.round(n*100):0)+' %';
function mkey(y,m){ return y+'-'+String(m+1).padStart(2,'0'); }
function allMonths(){
  const out=[];
  for(const t of STATE.txns) for(const k in t.values) if(!out.includes(k)) out.push(k);
  out.sort();
  return out;
}
function yearsAvailable(){
  const ys = new Set(allMonths().map(k=>+k.slice(0,4)));
  ys.add(2025); ys.add(2026);
  return [...ys].sort();
}
function pickDefaultMonth(){
  // dernier mois avec des revenus > 0, sinon le mois courant
  const today = new Date();
  const ck = mkey(today.getFullYear(), today.getMonth());
  const months = allMonths();
  if(months.includes(ck)) return ck;
  // sinon le mois le plus récent contenant des données
  return months.length? months[months.length-1] : ck;
}
function val(t, k){ return +(t.values[k]||0); }

/* calculs par mois */
function monthStats(k){
  let rev=0, conso=0, saveExpl=0;
  const byCat={};
  for(const t of STATE.txns){
    const v = val(t,k); if(!v) continue;
    const c=t.categorie;
    byCat[c]=(byCat[c]||0)+v;
    if(c===INCOME) rev+=v;
    else if(SAVE_CATS.includes(c)) saveExpl+=v;
    else conso+=v;
  }
  const reste = rev - conso - saveExpl;      // = Livret A (reste à épargner)
  const ep  = byCat['EPARGNE']||0;            // épargne placée (hors invest)
  const inv = byCat['INVESTISSEMENT']||0;     // investissement placé
  const epargneTot = saveExpl + reste;        // épargne totale du mois (épargne+invest+reste)
  const tauxEp = rev? epargneTot/rev : 0;
  return {rev, conso, saveExpl, ep, inv, reste, epargneTot, tauxEp, byCat};
}
function monthsOfYear(y){ return Array.from({length:12},(_,m)=>mkey(y,m)); }
function cumulSavings(uptoKey){
  // épargne de départ + somme des épargnes totales des mois <= uptoKey (année de uptoKey)
  const y = +uptoKey.slice(0,4);
  let cum = STATE.settings.startSavings;
  for(const k of monthsOfYear(y)){
    if(k>uptoKey) break;
    cum += monthStats(k).epargneTot;
  }
  return cum;
}
// Patrimoine (tout l'historique) : épargne de départ + toutes les épargnes mensuelles jusqu'à uptoKey
function allTimeSaved(uptoKey){
  let cum = +STATE.settings.startSavings||0;
  const months=allMonths();
  for(const k of months){ if(k<=uptoKey) cum += monthStats(k).epargneTot; }
  return cum;
}
// Total versé en investissement (PEA, ETF…) jusqu'à uptoKey
function totalInvested(uptoKey){
  let sum=0;
  for(const t of STATE.txns){ if(t.categorie!=='INVESTISSEMENT') continue;
    for(const k in t.values){ if(k<=uptoKey) sum+=+t.values[k]||0; } }
  return sum;
}
// Valeur retenue des investissements : saisie manuelle si définie, sinon montant versé
function investValueOf(uptoKey){
  const v=STATE.settings.investValue;
  return (v!=null && v!=='')? +v : totalInvested(uptoKey);
}
function assetsSum(){ return (STATE.settings.assets||[]).reduce((a,x)=>a+(+x.value||0),0); }
function liabsSum(){ return (STATE.settings.liabs||[]).reduce((a,x)=>a+(+x.value||0),0); }

  const bar=(lbl,v,col)=>`<div class="barrow"><div class="nm">${lbl}</div>
     <div class="track"><div class="fill" style="width:${Math.max(2,v/maxv*100)}%;background:${col}"></div></div>
     <div class="amt">${fmt(v)}</div></div>`;

  return `
  <div class="grid kpis">
    <div class="card kpi"><div class="label"><span class="dot" style="background:var(--income)"></span>Revenus</div>
      <div class="val">${fmt(s.rev)}</div><div class="sub">${delta(s.rev,sp.rev)} vs ${MONTHS_FR[(m+11)%12].slice(0,3)}.</div></div>
    <div class="card kpi"><div class="label"><span class="dot" style="background:var(--bad)"></span>Dépenses</div>
      <div class="val">${fmt(s.conso)}</div><div class="sub">${delta(s.conso,sp.conso,true)} ${s.rev?pct(s.conso/s.rev)+' du revenu':''}</div></div>
    <div class="card kpi"><div class="label"><span class="dot" style="background:var(--warn)"></span>Reste à dépenser</div>
      ${dBudget>0
        ? `<div class="val ${dRemain<0?'neg':'pos'}">${fmt(dRemain)}</div><div class="sub">sur ${fmt(dBudget)} prévus · <a href="#" id="goTxns" style="font-weight:600">gérer →</a></div>`
        : `<div class="val muted">—</div><div class="sub">aucun budget prévu · <a href="#" id="goPrev" style="font-weight:600">planifier →</a></div>`}</div>
    <div class="card kpi"><div class="label"><span class="dot" style="background:var(--good)"></span>Reste à épargner</div>
      <div class="val ${resteCls}">${fmt(s.reste)}</div><div class="sub">va sur ton livret en fin de mois</div></div>
    <div class="card kpi"><div class="label"><span class="dot" style="background:var(--save)"></span>Épargne du mois</div>
      <div class="val">${fmt(s.ep + s.reste)}</div><div class="sub">${fmt(s.ep)} placés + ${fmt(s.reste)} de reste</div></div>
    <div class="card kpi"><div class="label"><span class="dot" style="background:var(--invest)"></span>Investissement du mois</div>
      <div class="val">${fmt(s.inv)}</div><div class="sub">${delta(s.inv,sp.inv)} vs ${MONTHS_FR[(m+11)%12].slice(0,3)}.</div></div>
    <div class="card kpi"><div class="label"><span class="dot" style="background:var(--accent)"></span>Taux d'épargne</div>
      <div class="val">${pct(s.tauxEp)}</div><div class="sub">épargne + invest. · objectif ≥ 20 %</div></div>
    <div class="card kpi"><div class="label"><span class="dot" style="background:var(--c9)"></span>Épargne cumulée</div>
      <div class="val">${fmt(cum)}</div><div class="sub">au ${MONTHS_FR[m]} ${y} · départ ${fmt(STATE.settings.startSavings)}</div></div>
  </div>

  <div class="two section">
    <div class="card">
      <h2>Où part mon argent — ${MONTHS_FR[m]} ${y}</h2>
      ${consoCats.length? `<div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap">
        <div>${donut}</div>
        <div style="flex:1;min-width:180px">
          ${consoCats.map(x=>`<div class="barrow"><div class="nm"><span class="dot" style="background:${CAT_COLOR[x.c]}"></span>${CAT_LABEL[x.c]}</div>
            <div class="track"><div class="fill" style="width:${x.v/consoCats[0].v*100}%;background:${CAT_COLOR[x.c]}"></div></div>
            <div class="amt">${fmt(x.v)}</div></div>`).join('')}
        </div></div>`
        : `<div class="empty">Aucune dépense saisie pour ce mois.<br>Va dans <b>Transactions</b> pour en ajouter.</div>`}
    </div>
    <div class="card">
      <h2>Équilibre du mois</h2>
      ${bar('Revenus', s.rev, 'var(--income)')}
      ${bar('Dépenses', s.conso, 'var(--bad)')}
      ${bar('Épargne placée', s.ep, 'var(--save)')}
      ${bar('Investissement', s.inv, 'var(--invest)')}
      <div style="border-top:1px solid var(--border);margin:12px 0"></div>
      <div class="barrow"><div class="nm" style="font-weight:800">Reste à épargner</div>
        <div class="track" style="background:transparent"></div>
        <div class="amt ${resteCls}" style="font-size:16px">${fmt(s.reste)}</div></div>
      <p class="hint" style="margin-top:6px">Le « reste » se place automatiquement sur ton épargne (Livret A). S'il est négatif, tu as dépensé plus que gagné ce mois-ci.</p>
    </div>
  </div>

  <div class="section card">
    <h2>Progression sur ${y}</h2>
    ${yearBarsSVG(y)}
  </div>`;
}

/* ---- Prévision ---- */
function viewPrevision(){
  const y=+CUR.slice(0,4), m=+CUR.slice(5,7)-1;
  const s = monthStats(CUR);
  const fc = monthForecast(CUR);
  const rows = CONSO.map(c=>{
    const prevu = catBudget(c);
    const real = s.byCat[c]||0;
    const rest = prevu - real;
    const raw = (fc[c]!=null&&fc[c]!=='')? fc[c] : '';
    const over = real>prevu && prevu>0;
    const ratio = prevu>0? Math.min(100, real/prevu*100) : (real>0?100:0);
    return `<div class="prevrow">
      <div class="prevname"><span class="dot" style="background:${CAT_COLOR[c]}"></span>${CAT_LABEL[c]}</div>
      <div class="prevbudget">Prévu <input type="number" step="10" min="0" class="prev-inp" data-cat="${c}" value="${raw}" placeholder="${prevu}"> €</div>
      <div class="prevbar"><div class="track"><div class="fill" style="width:${ratio}%;background:${over?'var(--bad)':CAT_COLOR[c]}"></div></div></div>
      <div class="prevreal muted">réalisé ${fmt(real)}</div>
      <div class="prevrest ${rest<0?'neg':'pos'}">${over?'−':''}${fmt(Math.abs(rest))}</div>
    </div>`;
  }).join('');
  const totPrev = CONSO.reduce((a,c)=>a+catBudget(c),0);
  const totReal = s.conso;
  const totRest = totPrev - totReal;
  const nbPlanned = Object.keys(fc).length;

  return `
  <div class="section">
    <div class="card">
      <div class="rowbetween">
        <h2>📋 Prévision — ${MONTHS_FR[m]} ${y}</h2>
        <span class="chip">${nbPlanned} catégorie${nbPlanned>1?'s':''} planifiée${nbPlanned>1?'s':''}</span>
      </div>
      <p class="hint" style="margin-top:2px">Définis le montant <b>alloué</b> à chaque catégorie pour ce mois. Le « reste à dépenser » se calcule sur <b>prévu − réalisé</b>.</p>
      <div class="toolbar" style="margin-top:12px">
        <button class="btn ghost" id="prevCopyPrev">⧉ Copier ${MONTHS_FR[(m+11)%12].slice(0,3)}.</button>
        <button class="btn ghost" id="prevApplyYear">📅 Appliquer à toute l'année ${y}</button>
        <button class="btn ghost" id="prevFromReal">↺ Partir du réalisé</button>
      </div>
    </div>

    <div class="card section" style="padding:0;overflow:hidden">
      <div class="prevrow prevhead">
        <div>Catégorie</div><div>Alloué (prévu)</div><div></div><div>Réalisé</div><div>Reste</div>
      </div>
      ${rows}
      <div class="prevrow prevtot">
        <div>Total</div>
        <div>${fmt(totPrev)}</div><div></div>
        <div class="muted">${fmt(totReal)}</div>
        <div class="${totRest<0?'neg':'pos'}">${fmt(totRest)}</div>
      </div>
    </div>
    <p class="hint" style="margin-top:10px">Astuce : renseigne un mois type, puis « Appliquer à toute l'année » pour dupliquer. Tu ajustes ensuite les mois particuliers.</p>
  </div>`;
}

/* ---- Transactions ---- */
function viewTxns(){
  const y=+CUR.slice(0,4), m=+CUR.slice(5,7)-1;
  const s = monthStats(CUR);
  // regroupe par catégorie dans l'ordre défini
  const rows = STATE.txns.slice().sort((a,b)=>{
    const ca=CAT_ORDER.indexOf(a.categorie), cb=CAT_ORDER.indexOf(b.categorie);
    if(ca!==cb) return ca-cb;
    return (a.groupe||'').localeCompare(b.groupe||'');
  });
  let body='', curCat=null;
  for(const t of rows){
    if(t.categorie!==curCat){
      curCat=t.categorie;
      const ct = CAT_ORDER.includes(curCat)? (SAVE_CATS.includes(curCat)?'Épargne/Invest.':curCat===INCOME?'Revenus':'Dépense'):'';
      body+=`<tr class="grouphead"><td colspan="4"><span class="dot" style="background:${CAT_COLOR[curCat]||'var(--muted)'}"></span> ${CAT_LABEL[curCat]||curCat}</td></tr>`;
    }
    const v = t.values[CUR];
    body+=`<tr data-id="${t.id}">
      <td>${esc(t.label)}</td>
      <td class="muted" style="font-size:12.5px">${esc(t.groupe||'')}</td>
      <td class="num"><input class="editval" type="number" step="0.01" value="${v!=null?v:''}" placeholder="0" data-id="${t.id}"></td>
      <td class="center"><button class="rowbtn" data-del="${t.id}" title="Supprimer la ligne">✕</button></td>
    </tr>`;
  }
  const totBudget = CONSO.reduce((a,c)=>a+catBudget(c),0);
  const totRemaining = totBudget - s.conso;
  const catCards = CONSO.map(c=>catRemainCard(c,s)).join('');
  const addOpts = CONSO.concat(SAVE_CATS,[INCOME]).map(c=>`<option value="${c}">${CAT_LABEL[c]}</option>`).join('');

  return `
  <div class="section">
    <div class="card quickadd" style="background:linear-gradient(180deg,color-mix(in srgb,var(--accent) 6%,var(--panel)),var(--panel))">
      <div class="rowbetween" style="margin-bottom:10px"><h2>➕ Ajouter une dépense — ${MONTHS_FR[m]} ${y}</h2>
        <button class="btn ghost" id="copyPrev" style="padding:6px 11px;font-size:12.5px">⧉ Copier ${MONTHS_FR[(m+11)%12].slice(0,3)}.</button></div>
      <div class="qa-row">
        <select id="qaCat">${addOpts}</select>
        <input id="qaAmt" type="number" step="0.01" inputmode="decimal" placeholder="Montant €">
        <input id="qaLbl" type="text" placeholder="Libellé (optionnel — ex : Carrefour)">
        <button class="btn" id="qaAdd">Ajouter</button>
      </div>
      <p class="hint" style="margin-top:8px">Ça s'additionne automatiquement dans la catégorie. Appuie sur <b>Entrée</b> pour enchaîner.</p>
    </div>

    <div class="card">
      <div class="rowbetween">
        <h2>💰 Reste à dépenser — ${MONTHS_FR[m]}</h2>
        <span class="bignum ${totRemaining<0?'neg':'pos'}">${fmt(totRemaining)}</span>
      </div>
      <p class="hint" style="margin-top:2px">${totBudget>0
        ? `Prévu ${fmt(totBudget)} − réalisé ${fmt(s.conso)} = reste ${fmt(totRemaining)}. Le prévu se règle dans l'onglet <b>Prévision</b> (ou dans les cartes).`
        : `Aucun budget prévu pour ce mois — définis tes montants alloués dans l'onglet <b>Prévision</b> (ou directement dans les cartes).`}</p>
      <div class="catgrid">${catCards}</div>
    </div>

    <div class="card section" style="padding:0;overflow:hidden">
      <div class="rowbetween" style="padding:14px 16px 4px"><h2>Détail des lignes</h2>
        <span class="chip">Reste à épargner <b class="${s.reste>=0?'pos':'neg'}">${fmt(s.reste)}</b></span></div>
      <div style="max-height:52vh;overflow:auto">
      <table class="tbl">
        <thead><tr><th>Ligne</th><th>Groupe</th><th class="num">Montant (${MONTHS_FR[m].slice(0,3)}.)</th><th></th></tr></thead>
        <tbody>${body||'<tr><td colspan=4 class="empty">Aucune ligne — ajoute ta première dépense ci-dessus 👆</td></tr>'}</tbody>
      </table>
      </div>
    </div>
  </div>`;
}

/* ---- Patrimoine ---- */
function viewPatrimoine(){
  const cur=CUR, y=+cur.slice(0,4);
  const invested = totalInvested(cur);
  const investVal = investValueOf(cur);
  const cash = allTimeSaved(cur) - invested;
  const manualAssets = STATE.settings.assets||[];
  const manualLiabs = STATE.settings.liabs||[];
  const totalActifs = cash + investVal + assetsSum();
  const totalPassifs = liabsSum();
  const net = totalActifs - totalPassifs;
  const hasOverride = STATE.settings.investValue!=null && STATE.settings.investValue!=='';
  const plusValue = hasOverride ? (investVal - invested) : null;

  const items=[{label:'Épargne',value:Math.max(0,cash),color:'var(--save)'},
               {label:'Investissements',value:Math.max(0,investVal),color:'var(--invest)'}]
    .concat(manualAssets.map((a,i)=>({label:a.label||'Actif',value:Math.max(0,+a.value||0),color:`var(--c${[1,6,8,9,3,7,0,2][i%8]})`})))
    .filter(x=>x.value>0);
  const donut = donutSVG(items, fmt(net), 'Net');

  const assetRow=(a)=>`<div class="miniremain">
     <input type="text" class="asset-lbl" data-aid="${a.id}" value="${esc(a.label||'')}" placeholder="Ex : Appartement" style="border:none;background:transparent;font-weight:650;flex:1;min-width:80px;padding:4px 0">
     <span style="display:flex;align-items:center;gap:6px"><input type="number" class="asset-val" data-aid="${a.id}" value="${a.value!=null?a.value:''}" placeholder="0" style="width:120px;text-align:right"> €
     <button class="rowbtn" data-adel="${a.id}" title="Supprimer">✕</button></span></div>`;
  const liabRow=(a)=>`<div class="miniremain">
     <input type="text" class="liab-lbl" data-lid="${a.id}" value="${esc(a.label||'')}" placeholder="Ex : Prêt immobilier" style="border:none;background:transparent;font-weight:650;flex:1;min-width:80px;padding:4px 0">
     <span style="display:flex;align-items:center;gap:6px"><input type="number" class="liab-val" data-lid="${a.id}" value="${a.value!=null?a.value:''}" placeholder="0" style="width:120px;text-align:right"> €
     <button class="rowbtn" data-ldel="${a.id}" title="Supprimer">✕</button></span></div>`;

  return `
  <div class="section">
    <div class="two">
      <div class="card">
        <div class="rowbetween"><h2>💎 Patrimoine net</h2><span class="chip">${MONTHS_FR[+cur.slice(5,7)-1]} ${y}</span></div>
        <div class="bignum ${net<0?'neg':''}" style="font-size:36px;margin:8px 0">${fmt(net)}</div>
        <div style="display:flex;gap:20px;flex-wrap:wrap;color:var(--muted);font-size:13.5px">
          <span>Actifs <b style="color:var(--good)">${fmt(totalActifs)}</b></span>
          <span>Passifs <b style="color:var(--bad)">${fmt(totalPassifs)}</b></span>
          <span>Investi (versé) <b>${fmt(invested)}</b>${plusValue!=null?` · <b class="${plusValue>=0?'pos':'neg'}">${plusValue>=0?'+':''}${fmt(plusValue)}</b> de +/- value`:''}</span>
        </div>
      </div>
      <div class="card center">${items.length?donut:'<div class="empty">Ajoute des actifs pour voir la répartition</div>'}
        <div class="legend" style="justify-content:center;margin-top:6px">${items.map(x=>`<div class="li"><span class="dot" style="background:${x.color}"></span>${esc(x.label)}</div>`).join('')}</div>
      </div>
    </div>

    <div class="card section">
      <h2>Actifs</h2>
      <div class="miniremain"><span style="font-weight:650"><span class="dot" style="background:var(--save)"></span> Épargne (cash)</span>
        <span class="muted" title="Calculé automatiquement depuis ton budget">${fmt(cash)} · auto</span></div>
      <div class="miniremain"><span style="font-weight:650"><span class="dot" style="background:var(--invest)"></span> Investissements
        <span class="hint">versé ${fmt(invested)}</span></span>
        <span style="display:flex;align-items:center;gap:6px">Valeur <input type="number" id="investVal" value="${hasOverride?STATE.settings.investValue:''}" placeholder="${invested}" style="width:120px;text-align:right"> €</span></div>
      ${manualAssets.map(assetRow).join('')}
      <div class="toolbar" style="margin-top:12px"><button class="btn ghost" id="addAsset">+ Ajouter un actif</button>
        <span class="hint">immobilier, voiture, crypto, valeur actuelle du PEA…</span></div>
    </div>

    <div class="card section">
      <h2>Passifs (dettes)</h2>
      ${manualLiabs.length?manualLiabs.map(liabRow).join(''):'<p class="hint">Aucun passif. Ajoute un prêt immobilier, un crédit conso…</p>'}
      <div class="toolbar" style="margin-top:12px"><button class="btn ghost" id="addLiab">+ Ajouter un passif</button></div>
    </div>

    <div class="card section">
      <h2>Évolution de l'épargne accumulée — ${y}</h2>
      ${cumulLineSVG(y)}
      <p class="hint">Épargne cumulée mois par mois (hors valorisation des actifs). La valeur des investissements et biens s'ajoute au patrimoine net ci-dessus.</p>
    </div>
  </div>`;
}

/* ---- Évolution ---- */

  const ys = yearsAvailable();

  const data = months.map((k,i)=>{ const s=monthStats(k); return {i,label:MONTHS_FR[i].slice(0,3),...s}; });
  const totRev = data.reduce((a,d)=>a+d.rev,0);
  const totDep = data.reduce((a,d)=>a+d.conso,0);

  return `
  <div class="section">
    <div class="toolbar">
      <div class="switch" id="evoYearSw">${ys.map(yy=>`<button class="${yy===evoYear?'on':''}" data-y="${yy}">${yy}</button>`).join('')}</div>
      <div class="spacer"></div>
      <div class="chip">Revenus année <b style="color:var(--good)">${fmt(totRev)}</b></div>
      <div class="chip">Dépenses <b style="color:var(--bad)">${fmt(totDep)}</b></div>

      <h2>Revenus · Dépenses · Épargne — ${evoYear}</h2>

        <div class="li"><span class="dot" style="background:var(--income)"></span>Revenus</div>
        <div class="li"><span class="dot" style="background:var(--bad)"></span>Dépenses</div>
        <div class="li"><span class="dot" style="background:var(--save)"></span>Épargne</div>
      </div>

/* ---- Catégories (budget vs réel) ---- */
function viewCats(){
  const y=+CUR.slice(0,4), m=+CUR.slice(5,7)-1;
  const s = monthStats(CUR);
  const rows = CONSO.map(c=>{
    const real = s.byCat[c]||0;
    const budget = STATE.settings.budgets[c]!=null? STATE.settings.budgets[c] : suggestedBudget(c);
    return {c, real, budget};
  });
  const body = rows.map(r=>{
    const ratio = r.budget? r.real/r.budget : 0;
    const over = r.real>r.budget && r.budget>0;
    const col = over? 'var(--bad)': CAT_COLOR[r.c];
    return `<div class="barrow">
      <div class="nm"><span class="dot" style="background:${CAT_COLOR[r.c]}"></span>${CAT_LABEL[r.c]}</div>
      <div class="track"><div class="fill" style="width:${Math.min(100,ratio*100)}%;background:${col}"></div></div>
      <div class="amt">${fmt(r.real)} <span class="muted" style="font-weight:500">/ ${fmt(r.budget)}</span></div>
    </div>${over?`<div class="hint" style="margin:-4px 0 6px 162px;color:var(--bad)">Dépassé de ${fmt(r.real-r.budget)}</div>`:''}`;
  }).join('');
  const totReal = rows.reduce((a,r)=>a+r.real,0);
  const totBud = rows.reduce((a,r)=>a+r.budget,0);
  return `
  <div class="section">
    <div class="toolbar">
      <div class="chip">📅 ${MONTHS_FR[m]} ${y}</div>
      <div class="chip">Dépensé <b style="color:var(--bad)">${fmt(totReal)}</b></div>
      <div class="chip">Budget <b>${fmt(totBud)}</b></div>
      <div class="chip ${totReal<=totBud?'':''}">Écart <b class="${totReal<=totBud?'pos':'neg'}">${fmt(totBud-totReal)}</b></div>
    </div>
    <div class="card">
      <h2>Dépenses réelles vs budget — ${MONTHS_FR[m]} ${y}</h2>
      ${body}
      <p class="hint" style="margin-top:10px">Définis tes budgets mensuels par catégorie dans l'onglet <b>Réglages</b>. Par défaut ils sont estimés sur ta moyenne 2026.</p>
    </div>
    <div class="card section">
      <h2>Répartition annuelle ${y} par catégorie</h2>
      ${yearCatBreakdown(y)}
    </div>
  </div>`;
}

/* ============ CHARTS (SVG maison) ============ */
function donutSVG(items, centerVal, centerLbl){
  const total = items.reduce((a,x)=>a+x.value,0)||1;
  const R=62, r=40, cx=75, cy=75; let a0=-Math.PI/2; let paths='';
  for(const it of items){
    const frac=it.value/total, a1=a0+frac*2*Math.PI;
    const large=frac>.5?1:0;
    const x0=cx+R*Math.cos(a0), y0=cy+R*Math.sin(a0), x1=cx+R*Math.cos(a1), y1=cy+R*Math.sin(a1);
    const xi1=cx+r*Math.cos(a1), yi1=cy+r*Math.sin(a1), xi0=cx+r*Math.cos(a0), yi0=cy+r*Math.sin(a0);
    paths+=`<path d="M${x0} ${y0} A${R} ${R} 0 ${large} 1 ${x1} ${y1} L${xi1} ${yi1} A${r} ${r} 0 ${large} 0 ${xi0} ${yi0} Z" fill="${it.color}" data-tip="${esc(it.label)} · ${fmt(it.value)} (${pct(it.value/total)})"></path>`;
    a0=a1;
  }
  return `<svg viewBox="0 0 150 150" width="150" height="150" class="donut">${paths}
    <text x="75" y="70" text-anchor="middle" fill="var(--text)" font-size="17" font-weight="750">${centerVal}</text>
    <text x="75" y="88" text-anchor="middle" fill="var(--muted)" font-size="10" font-weight="600" letter-spacing=".5">${centerLbl.toUpperCase()}</text></svg>`;
}

function yearBarsSVG(y){
  const data = monthsOfYear(y).map((k,i)=>({i,...monthStats(k)}));
  return evoBarsSVG(data.map((d,i)=>({...d,label:MONTHS_FR[i].slice(0,3)})));
}
function evoBarsSVG(data){
  const W=Math.max(680, data.length*54), H=230, pad=30, bw=10, gap=4;
  const maxv = Math.max(1, ...data.map(d=>Math.max(d.rev, d.conso, d.epargneTot)));
  const bh = H-pad*2;
  const yb = v=> H-pad - (v/maxv)*bh;
  let bars='', labels='', grid='';
  for(let g=0;g<=4;g++){ const gy=H-pad-(g/4)*bh; const gv=maxv*g/4;
    grid+=`<line x1="${pad}" y1="${gy}" x2="${W-6}" y2="${gy}" stroke="var(--border)" stroke-width="1"/>
    <text x="${pad-4}" y="${gy+3}" text-anchor="end" fill="var(--muted)" font-size="9">${Math.round(gv)}</text>`; }
  const cw = (W-pad-10)/data.length;
  data.forEach((d,i)=>{
    const x = pad + i*cw + cw/2;
    const set=[['rev','var(--income)',d.rev],['conso','var(--bad)',d.conso],['epargneTot','var(--save)',d.epargneTot]];
    set.forEach((s,j)=>{
      const bx = x - (bw*1.5+gap) + j*(bw+gap);
      const h = Math.max(0,(H-pad)-yb(s[2]));
      bars+=`<rect x="${bx}" y="${yb(s[2])}" width="${bw}" height="${h}" rx="2" fill="${s[1]}"
        data-tip="${d.label} · ${({rev:'Revenus',conso:'Dépenses',epargneTot:'Épargne'})[s[0]]} : ${fmt(s[2])}"></rect>`;
    });
    labels+=`<text x="${x}" y="${H-pad+14}" text-anchor="middle" fill="var(--muted)" font-size="10">${d.label}</text>`;
  });
  return `<div class="chartwrap"><svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">${grid}${bars}${labels}</svg></div>`;
}

function cumulLineSVG(y){
  const months = monthsOfYear(y);
  let cum = STATE.settings.startSavings;
  const pts = months.map((k,i)=>{ cum += monthStats(k).epargneTot; return {i,label:MONTHS_FR[i].slice(0,3),v:cum}; });
  const start = STATE.settings.startSavings;
  const W=Math.max(680, months.length*54), H=220, pad=34;
  const vals=[start,...pts.map(p=>p.v)];
  const minv=Math.min(...vals), maxv=Math.max(...vals), span=(maxv-minv)||1;
  const bh=H-pad*2;
  const px=i=> pad + i*((W-pad-10)/(months.length));
  const py=v=> H-pad - ((v-minv)/span)*bh;
  let grid='';
  for(let g=0;g<=4;g++){ const gy=H-pad-(g/4)*bh; const gv=minv+span*g/4;
    grid+=`<line x1="${pad}" y1="${gy}" x2="${W-6}" y2="${gy}" stroke="var(--border)"/>
    <text x="${pad-4}" y="${gy+3}" text-anchor="end" fill="var(--muted)" font-size="9">${Math.round(gv)}</text>`; }
  let d=`M${px(0)} ${py(start)}`; pts.forEach(p=> d+=` L${px(p.i+1)} ${py(p.v)}`);
  let area=d+` L${px(months.length)} ${H-pad} L${px(0)} ${H-pad} Z`;
  let dots='', labels='';
  pts.forEach(p=>{ dots+=`<circle cx="${px(p.i+1)}" cy="${py(p.v)}" r="3.5" fill="var(--save)" data-tip="${p.label} : ${fmt(p.v)}"></circle>`;
    labels+=`<text x="${px(p.i+1)}" y="${H-pad+14}" text-anchor="middle" fill="var(--muted)" font-size="10">${p.label}</text>`; });
  return `<div class="chartwrap"><svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}">${grid}
    <path d="${area}" fill="color-mix(in srgb,var(--save) 16%,transparent)"/>
    <path d="${d}" fill="none" stroke="var(--save)" stroke-width="2.5"/>${dots}${labels}</svg></div>`;
}

function yearCatBreakdown(y){
  const months = monthsOfYear(y);
  const tot = {};
  CONSO.forEach(c=>tot[c]=0);
  months.forEach(k=>{ const s=monthStats(k); CONSO.forEach(c=> tot[c]+=(s.byCat[c]||0)); });
  const arr = CONSO.map(c=>({c,v:tot[c]})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v);
  const max = arr.length? arr[0].v:1;
  const grand = arr.reduce((a,x)=>a+x.v,0);
  if(!arr.length) return '<div class="empty">Pas encore de dépenses cette année.</div>';
  return arr.map(x=>`<div class="barrow"><div class="nm"><span class="dot" style="background:${CAT_COLOR[x.c]}"></span>${CAT_LABEL[x.c]}</div>
    <div class="track"><div class="fill" style="width:${x.v/max*100}%;background:${CAT_COLOR[x.c]}"></div></div>
    <div class="amt">${fmt(x.v)} <span class="muted" style="font-weight:500">${pct(x.v/grand)}</span></div></div>`).join('')
    + `<div class="barrow" style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px"><div class="nm" style="font-weight:800">Total dépenses</div><div class="track" style="background:transparent"></div><div class="amt" style="font-weight:800">${fmt(grand)}</div></div>`;
}

/* ============ ACTIONS / BIND ============ */
function suggestedBudget(c){
  // moyenne des mois 2026 non nuls pour la catégorie
  const months = monthsOfYear(2026);
  let sum=0,n=0;
  for(const k of months){ const s=monthStats(k); const v=s.byCat[c]||0; if(v>0){sum+=v;n++;} }
  return n? Math.round(sum/n) : 0;
}
// Montant prévu (budget) pour une catégorie sur un mois donné :
//   prévision du mois  →  budget par défaut (Réglages)  →  0 (rien de prévu)
// Le « reste à dépenser » est STRICTEMENT : prévu − transactions saisies.
// (la moyenne des réalisés n'est plus qu'une suggestion affichée, jamais utilisée en calcul)
function catBudget(c, key){
  key = key || CUR;
  const f = STATE.settings.forecast && STATE.settings.forecast[key];
  if(f && f[c]!=null && f[c]!=='') return +f[c];
  const b = STATE.settings.budgets[c];
  if(b!=null && b!=='') return +b;
  return 0;
}
function monthForecast(key){ return (STATE.settings.forecast && STATE.settings.forecast[key]) || {}; }
function setForecast(key, c, val){
  if(!STATE.settings.forecast[key]) STATE.settings.forecast[key]={};
  if(val===''||val==null) delete STATE.settings.forecast[key][c];
  else STATE.settings.forecast[key][c] = +val;
  if(Object.keys(STATE.settings.forecast[key]).length===0) delete STATE.settings.forecast[key];
}
const GROUP_DEFAULT={'CHARGE COURANTE':'APPARTEMENT','BOUFFE':'COURSE','PERSONNEL':'PERSONNEL','IMPÔT':'IMPOSITION','DETTE':'DETTE','AIDE':'CARITATIVE','AUTRE':'AUTRE','EPARGNE':'EPARGNE','INVESTISSEMENT':'INVESTISSEMENT','ENTREE':'ENTREE'};
function defaultGroup(c){ return GROUP_DEFAULT[c]||c; }
function todayStamp(){ const d=new Date(); return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0'); }
// carte « reste à dépenser » d'une catégorie
function catRemainCard(c, s){
  const spent=s.byCat[c]||0, budget=catBudget(c), remaining=budget-spent;
  const ratio=budget>0? spent/budget : (spent>0?1:0);
  const over=budget>0 && spent>budget;
  const col=over?'var(--bad)':(ratio>0.85?'var(--warn)':CAT_COLOR[c]);
  return `<div class="catcard" data-cat="${c}">
    <div class="catcard-top">
      <span class="catname"><span class="dot" style="background:${CAT_COLOR[c]}"></span>${CAT_LABEL[c]}</span>
      <span class="catreste ${remaining<0?'neg':'pos'}">${over?'−':''}${fmt(Math.abs(remaining))}</span>
    </div>
    <div class="track" style="margin-top:9px"><div class="fill" style="width:${Math.min(100,ratio*100)}%;background:${col}"></div></div>
    <div class="catcard-bot">
      <span>réalisé ${fmt(spent)} / prévu ${fmt(budget)}</span>
      <span>Prévu <input class="budinput" type="number" step="10" min="0" data-bud="${c}" value="${budget}"> €</span>
    </div>
  </div>`;
}

  const gPick=document.getElementById('gPick'); if(gPick) gPick.onclick=()=>openSharedBudget();
  const gOwn=document.getElementById('gOwn'); if(gOwn) gOwn.onclick=()=>{ if(confirm('Revenir à ton budget personnel ?')) useOwnBudget(); };
  const gSaveKey=document.getElementById('gSaveKey'); if(gSaveKey) gSaveKey.onclick=()=>{
    const v=(document.getElementById('gApiKey').value||'').trim();
    if(!/^AIza[0-9A-Za-z_\-]{20,}$/.test(v)){ toast('Clé API invalide (commence par AIza…)'); return; }
    localStorage.setItem('mb_apikey',v); render(); toast('Clé enregistrée');
  };
  bindTooltips();
}
function refreshTxnChips(){
  const s=monthStats(CUR);
  // simple: re-render toolbar chips via full render is heavy; just update on next full render
}

/* Tooltips SVG */
function bindTooltips(){
  const tt=document.getElementById('tt');
  document.querySelectorAll('[data-tip]').forEach(el=>{
    el.onmousemove=(e)=>{ tt.textContent=el.getAttribute('data-tip'); tt.style.opacity=1;
      tt.style.left=(e.clientX+12)+'px'; tt.style.top=(e.clientY-10)+'px'; };
    el.onmouseleave=()=>{ tt.style.opacity=0; };
  });
}

/* Export / import */
function exportJSON(){
  const blob=new Blob([JSON.stringify(STATE,null,2)],{type:'application/json'});
  dl(blob,'mon-budget-'+new Date().toISOString().slice(0,10)+'.json'); toast('Sauvegarde exportée');
}
function importJSON(e){
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader(); rd.onload=()=>{ try{ const s=JSON.parse(rd.result); if(!s.txns) throw 0;
    STATE=migrate(s); save(); render(); toast('Sauvegarde importée'); }catch(err){ toast('Fichier invalide'); } };
  rd.readAsText(f);
}
function exportCSV(){
  const months=allMonths();
  let csv='Categorie;Groupe;Libelle;'+months.join(';')+'\n';
  STATE.txns.forEach(t=>{ csv+=`${t.categorie};${t.groupe||''};${t.label};`+months.map(k=>String(t.values[k]??'').replace('.',',')).join(';')+'\n'; });
  dl(new Blob([csv],{type:'text/csv;charset=utf-8'}),'mon-budget.csv'); toast('CSV exporté');
}
function dl(blob,name){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }

/* utils */
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
let toastTimer;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1600); }
function showErr(context,detail){
  console.error('[MonBudget]',context,detail);
  const b=document.getElementById('errBar'); if(!b) return;
  b.style.display='flex';
  b.innerHTML=`<div><b>⚠️ ${esc(context)}</b><br><code>${esc(String(detail||'').slice(0,300))}</code>`+
    `<div style="margin-top:6px"><button class="btn ghost" id="errRetry" style="padding:5px 10px;font-size:12.5px">Réessayer</button></div></div>`+
    `<span class="x" onclick="hideErr()">✕</span>`;
  const r=document.getElementById('errRetry'); if(r) r.onclick=()=>{ hideErr(); signInGoogle(); };
}
function hideErr(){ const b=document.getElementById('errBar'); if(b){ b.style.display='none'; b.innerHTML=''; } }
window.hideErr=hideErr;
